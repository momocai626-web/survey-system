<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台管理 - 問卷統計</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a25;
      --border-color: #2a2a3a;
      --border-glow: #6366f1;
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --text-muted: #555568;
      --accent-primary: #6366f1;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --gradient-pre: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
      --gradient-post: linear-gradient(135deg, #10b981 0%, #059669 50%, #047857 100%);
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
    }
    body { font-family: 'Inter', 'Microsoft JhengHei', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
    body::before {
      content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(139,92,246,0.06) 0%, transparent 50%);
      z-index: -1;
    }

    /* ===== LOGIN ===== */
    #loginPage {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .login-card {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius-lg); padding: 48px 40px; width: 100%; max-width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .login-icon { font-size: 2.5rem; text-align: center; margin-bottom: 8px; }
    .login-card h2 { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .login-card p { text-align: center; color: var(--text-muted); font-size: 0.875rem; margin-bottom: 32px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 12px 16px; background: var(--bg-secondary);
      border: 1px solid var(--border-color); border-radius: var(--radius-sm);
      color: var(--text-primary); font-size: 0.9rem; font-family: inherit; transition: border-color 0.2s;
    }
    .form-group input:focus { outline: none; border-color: var(--accent-primary); }
    .btn-login {
      width: 100%; padding: 13px; background: var(--gradient-pre);
      border: none; border-radius: var(--radius-sm); color: white;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: all 0.2s; margin-top: 8px; box-shadow: 0 4px 16px rgba(99,102,241,0.3);
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,102,241,0.4); }
    .login-error { color: var(--accent-red); font-size: 0.85rem; text-align: center; margin-top: 12px; display: none; }

    /* ===== DASHBOARD ===== */
    #dashPage { display: none; }
    .container { max-width: 1400px; margin: 0 auto; padding: 40px 24px; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid var(--border-color);
      flex-wrap: wrap; gap: 16px;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-icon {
      width: 48px; height: 48px; background: var(--gradient-pre);
      border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .header h1 {
      font-size: 1.75rem; font-weight: 700;
      background: linear-gradient(135deg, #f0f0f5 0%, #8888a0 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header-subtitle { font-size: 0.875rem; color: var(--text-muted); margin-top: 2px; }
    .header-actions { display: flex; gap: 12px; }
    .btn {
      padding: 10px 20px; border: none; border-radius: var(--radius-sm);
      font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 8px; font-family: inherit;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--gradient-pre); color: white; box-shadow: 0 2px 12px rgba(99,102,241,0.3); }
    .btn-logout { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border-color); }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 32px; background: var(--bg-card); padding: 6px; border-radius: var(--radius-md); border: 1px solid var(--border-color); width: fit-content; }
    .tab-btn {
      padding: 10px 24px; border: none; border-radius: var(--radius-sm);
      font-size: 0.875rem; font-weight: 500; cursor: pointer; font-family: inherit;
      transition: all 0.2s; color: var(--text-secondary); background: transparent;
    }
    .tab-btn.active-pre { background: var(--gradient-pre); color: white; box-shadow: 0 2px 12px rgba(99,102,241,0.3); }
    .tab-btn.active-post { background: var(--gradient-post); color: white; box-shadow: 0 2px 12px rgba(16,185,129,0.3); }

    /* Stats */
    .stats-overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius-lg); padding: 24px; transition: all 0.3s;
    }
    .stat-card:hover { border-color: var(--border-glow); }
    .stat-card .label { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 8px; }
    .stat-card .value { font-size: 2.5rem; font-weight: 800; }
    .value-pre { background: var(--gradient-pre); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .value-post { background: var(--gradient-post); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* Questions grid */
    .questions-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .question-card {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius-lg); padding: 24px; transition: all 0.3s;
    }
    .question-card:hover { border-color: var(--border-glow); }
    .question-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .question-card h3::before { content: ''; width: 4px; height: 20px; background: var(--gradient-pre); border-radius: 2px; }
    .question-card.post h3::before { background: var(--gradient-post); }
    .option-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color); }
    .option-row:last-child { border-bottom: none; }
    .option-label-text { font-size: 0.85rem; color: var(--text-secondary); flex: 1; padding-right: 8px; }
    .option-bar-wrapper { flex: 1; margin: 0 12px; height: 6px; background: var(--bg-secondary); border-radius: 3px; overflow: hidden; min-width: 60px; }
    .option-bar-pre { height: 100%; background: var(--gradient-pre); border-radius: 3px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); min-width: 2px; }
    .option-bar-post { height: 100%; background: var(--gradient-post); border-radius: 3px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); min-width: 2px; }
    .option-count { font-size: 0.875rem; font-weight: 600; color: var(--text-primary); min-width: 24px; text-align: right; }

    /* Open questions */
    .open-section { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 28px; margin-bottom: 24px; }
    .open-section h2 { font-size: 1.125rem; font-weight: 600; margin-bottom: 20px; }
    .open-item { padding: 14px; background: var(--bg-secondary); border-radius: var(--radius-sm); margin-bottom: 10px; border-left: 3px solid var(--accent-primary); }
    .open-item.post { border-left-color: var(--accent-green); }
    .open-item .idx { font-size: 0.75rem; color: var(--accent-primary); font-weight: 600; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .open-item.post .idx { color: var(--accent-green); }
    .open-item .text { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.7; }

    .loading { text-align: center; padding: 60px; color: var(--text-muted); }
    .spinner { width: 36px; height: 36px; border: 4px solid var(--border-color); border-top-color: var(--accent-primary); border-radius: 50%; margin: 0 auto 16px; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    @media (max-width: 768px) {
      .container { padding: 24px 16px; }
      .header { flex-direction: column; text-align: center; }
      .questions-grid { grid-template-columns: 1fr; }
      .tabs { width: 100%; }
      .tab-btn { flex: 1; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- LOGIN PAGE -->
  <div id="loginPage">
    <div class="login-card">
      <div class="login-icon">🔐</div>
      <h2>後台管理</h2>
      <p>請輸入管理員帳號密碼</p>
      <form id="loginForm">
        <div class="form-group">
          <label>帳號</label>
          <input type="text" id="username" placeholder="admin" autocomplete="username">
        </div>
        <div class="form-group">
          <label>密碼</label>
          <input type="password" id="password" placeholder="••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">登入</button>
        <div class="login-error" id="loginError">帳號或密碼錯誤</div>
      </form>
    </div>
  </div>

  <!-- DASHBOARD PAGE -->
  <div id="dashPage">
    <div class="container">
      <div class="header">
        <div class="header-left">
          <div class="header-icon">📊</div>
          <div>
            <h1>問卷統計儀表板</h1>
            <p class="header-subtitle">課前 &amp; 課後問卷資料</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn btn-primary" onclick="loadAll()">🔄 重新整理</button>
          <button class="btn btn-logout" onclick="logout()">登出</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active-pre" id="tabPre" onclick="switchTab('pre')">📋 課前問卷</button>
        <button class="tab-btn" id="tabPost" onclick="switchTab('post')">✅ 課後問卷</button>
      </div>

      <!-- PRE TAB -->
      <div class="tab-content active" id="contentPre">
        <div id="loadingPre" class="loading"><div class="spinner"></div><p>讀取課前資料...</p></div>
        <div id="dataPre" style="display:none;">
          <div class="stats-overview">
            <div class="stat-card"><div class="label">課前填寫人數</div><div class="value value-pre" id="preTotal">0</div></div>
          </div>
          <div class="questions-grid" id="preGrid"></div>
          <div class="open-section">
            <h2>💭 期望學習內容</h2>
            <div id="preLearnList"></div>
          </div>
          <div class="open-section">
            <h2>⚡ 寫程式困難</h2>
            <div id="preDiffList"></div>
          </div>
        </div>
        <div id="errorPre" style="display:none; text-align:center; padding:40px; color:var(--accent-red);"></div>
      </div>

      <!-- POST TAB -->
      <div class="tab-content" id="contentPost">
        <div id="loadingPost" class="loading"><div class="spinner"></div><p>讀取課後資料...</p></div>
        <div id="dataPost" style="display:none;">
          <div class="stats-overview">
            <div class="stat-card"><div class="label">課後填寫人數</div><div class="value value-post" id="postTotal">0</div></div>
          </div>
          <div class="questions-grid" id="postGrid"></div>
          <div class="open-section">
            <h2>⭐ 最喜歡的部分</h2>
            <div id="postBestList"></div>
          </div>
          <div class="open-section">
            <h2>🔧 需要改進的地方</h2>
            <div id="postImproveList"></div>
          </div>
          <div class="open-section">
            <h2>🚀 希望增加的主題</h2>
            <div id="postFutureList"></div>
          </div>
        </div>
        <div id="errorPost" style="display:none; text-align:center; padding:40px; color:var(--accent-red);"></div>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = '123456';
    const PRE_SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbyXDP5xSEVw9-KQxY6_gQLtCL6FxyhUUvBziVr5AmCZlBF5i2EN-YeWxtTThEXWWGCxFw/exec';
    const POST_SCRIPT_URL = 'https://script.google.com/macros/s/REPLACE_POST_GAS_URL/exec';

    const preQuestions = {
      github: { title: 'GitHub 帳號註冊與使用', options: ['完全不熟悉','聽過但沒用過','曾經註冊過帳號','熟悉 Repo 建立與 Push'] },
      vscode: { title: 'VS Code 安裝與操作',   options: ['沒安裝過 VS Code','安裝過但不常用','熟悉基本操作（開檔案、編輯程式）','熟悉插件安裝與設定'] },
      qwen:   { title: 'Qwen Code 擴充元件',   options: ['沒聽過','聽過但沒用過','安裝過但不熟悉功能','熟悉並常用'] },
      pages:  { title: 'GitHub Pages 部署網站', options: ['完全不熟悉','知道有這功能但沒用過','曾經部署過網站','熟悉部署流程並能獨立完成'] }
    };

    const postQuestions = {
      understanding: { title: '課程內容理解程度',   options: ['完全聽不懂','部分理解','大部分理解','完全理解並能應用'] },
      usefulness:    { title: '課程實用性',         options: ['沒什麼幫助','有一些幫助','很有幫助','對我非常有價值'] },
      pace:          { title: '課程節奏',           options: ['太快','剛好','太慢'] },
      skill:         { title: '工具與技術熟悉度提升', options: ['沒有提升','有一點提升','提升很多','已經能獨立操作'] }
    };

    // ===== LOGIN =====
    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashPage').style.display = 'block';
        loadAll();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    });

    function logout() {
      document.getElementById('dashPage').style.display = 'none';
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    // ===== TABS =====
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById('contentPre').classList.toggle('active', tab === 'pre');
      document.getElementById('contentPost').classList.toggle('active', tab === 'post');
      document.getElementById('tabPre').className = 'tab-btn' + (tab === 'pre' ? ' active-pre' : '');
      document.getElementById('tabPost').className = 'tab-btn' + (tab === 'post' ? ' active-post' : '');
    }

    // ===== LOAD =====
    async function loadAll() {
      loadPre();
      loadPost();
    }

    async function loadPre() {
      show('loadingPre'); hide('dataPre'); hide('errorPre');
      try {
        const res = await fetch(PRE_SCRIPT_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        document.getElementById('preTotal').textContent = data.length;
        renderGrid('preGrid', data, preQuestions, 'pre');
        renderOpenList('preLearnList', data, 'learn', 'pre');
        renderOpenList('preDiffList', data, 'difficulty', 'pre');
        hide('loadingPre'); show('dataPre');
      } catch (err) {
        hide('loadingPre');
        const el = document.getElementById('errorPre');
        el.textContent = '❌ 課前資料讀取失敗：' + err.message;
        show('errorPre');
      }
    }

    async function loadPost() {
      show('loadingPost'); hide('dataPost'); hide('errorPost');
      try {
        const res = await fetch(POST_SCRIPT_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        document.getElementById('postTotal').textContent = data.length;
        renderGrid('postGrid', data, postQuestions, 'post');
        renderOpenList('postBestList', data, 'best', 'post');
        renderOpenList('postImproveList', data, 'improve', 'post');
        renderOpenList('postFutureList', data, 'future', 'post');
        hide('loadingPost'); show('dataPost');
      } catch (err) {
        hide('loadingPost');
        const el = document.getElementById('errorPost');
        el.textContent = '❌ 課後資料讀取失敗：' + err.message;
        show('errorPost');
      }
    }

    function renderGrid(gridId, responses, questions, type) {
      const grid = document.getElementById(gridId);
      grid.innerHTML = '';
      Object.keys(questions).forEach(key => {
        const q = questions[key];
        const counts = {};
        q.options.forEach(o => counts[o] = 0);
        responses.forEach(r => {
          if (r[key] && counts.hasOwnProperty(r[key])) counts[r[key]]++;
        });
        const max = Math.max(...Object.values(counts), 1);
        let html = `<div class="question-card ${type}"><h3>${q.title}</h3>`;
        q.options.forEach(opt => {
          const c = counts[opt] || 0;
          const pct = (c / max) * 100;
          html += `<div class="option-row">
            <span class="option-label-text">${opt}</span>
            <div class="option-bar-wrapper"><div class="option-bar-${type}" style="width:${pct}%"></div></div>
            <span class="option-count">${c}</span>
          </div>`;
        });
        html += '</div>';
        grid.innerHTML += html;
      });
      if (grid.innerHTML === '') {
        grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);grid-column:1/-1;padding:40px;">目前尚無資料</p>';
      }
    }

    function renderOpenList(listId, responses, field, type) {
      const el = document.getElementById(listId);
      el.innerHTML = '';
      let has = false;
      responses.forEach((r, i) => {
        if (r[field] && r[field].trim()) {
          has = true;
          el.innerHTML += `<div class="open-item ${type}">
            <div class="idx">Response #${i + 1}</div>
            <div class="text">${escapeHtml(r[field])}</div>
          </div>`;
        }
      });
      if (!has) el.innerHTML = '<p style="text-align:center;color:var(--text-muted);">目前尚無資料</p>';
    }

    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function show(id) { document.getElementById(id).style.display = 'block'; }
    function hide(id) { document.getElementById(id).style.display = 'none'; }
  </script>
</body>
</html>
