<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台管理 - 問卷統計</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #06060f; --glass: rgba(255,255,255,.04); --glass-hover: rgba(255,255,255,.07);
      --border: rgba(255,255,255,.08); --border-strong: rgba(255,255,255,.16);
      --text-1: #f1f5f9; --text-2: #94a3b8; --text-3: #475569;
      --purple: #7c3aed; --indigo: #6366f1; --green: #10b981;
      --red: #ef4444; --amber: #f59e0b;
      --grad-pre:  linear-gradient(135deg, #7c3aed 0%, #6366f1 50%, #a855f7 100%);
      --grad-post: linear-gradient(135deg, #10b981 0%, #059669 50%, #047857 100%);
      --r-sm: 10px; --r-md: 16px; --r-lg: 20px; --r-xl: 28px;
    }
    body { font-family:'Inter','Microsoft JhengHei',sans-serif; background:var(--bg); color:var(--text-1); min-height:100vh; overflow-x:hidden; }

    /* Aurora */
    .aurora { position:fixed; inset:0; z-index:-2; overflow:hidden; pointer-events:none; }
    .aurora-blob { position:absolute; border-radius:50%; filter:blur(140px); }
    .aurora-blob:nth-child(1) { width:700px; height:700px; opacity:.1; background:radial-gradient(circle,#7c3aed,transparent 70%); top:-250px; left:-200px; animation:b1 30s ease-in-out infinite; }
    .aurora-blob:nth-child(2) { width:500px; height:500px; opacity:.08; background:radial-gradient(circle,#10b981,transparent 70%); bottom:-180px; right:-150px; animation:b2 36s ease-in-out infinite; }
    @keyframes b1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(50px,35px) scale(1.1)} }
    @keyframes b2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,-25px) scale(1.08)} }
    .grid-bg { position:fixed; inset:0; z-index:-1; pointer-events:none; background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px); background-size:64px 64px; }

    /* ===== LOGIN ===== */
    #loginPage { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .login-card {
      background:var(--glass); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
      border:1px solid var(--border); border-radius:var(--r-xl);
      padding:48px 40px; width:100%; max-width:420px;
      box-shadow:0 24px 60px rgba(0,0,0,.5);
      animation:fadeUp .5s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .login-icon { font-size:2.5rem; text-align:center; margin-bottom:12px; }
    .login-card h2 { text-align:center; font-size:1.5rem; font-weight:700; letter-spacing:-.02em; margin-bottom:4px; }
    .login-card p { text-align:center; color:var(--text-3); font-size:.85rem; margin-bottom:32px; }
    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:.72rem; font-weight:600; color:var(--text-3); letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; }
    .form-group input {
      width:100%; padding:12px 14px; background:rgba(255,255,255,.03);
      border:1px solid var(--border); border-radius:var(--r-sm);
      color:var(--text-1); font-size:.9rem; font-family:inherit; transition:all .2s;
    }
    .form-group input:focus { outline:none; border-color:rgba(124,58,237,.5); background:rgba(255,255,255,.05); box-shadow:0 0 0 3px rgba(124,58,237,.12); }
    .btn-login {
      width:100%; padding:14px; background:var(--grad-pre);
      border:none; border-radius:var(--r-sm); color:white;
      font-size:.95rem; font-weight:600; cursor:pointer; font-family:inherit;
      transition:all .2s; margin-top:8px;
      box-shadow:0 4px 20px rgba(124,58,237,.3),inset 0 1px 0 rgba(255,255,255,.2);
    }
    .btn-login:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(124,58,237,.42),inset 0 1px 0 rgba(255,255,255,.2); }
    .login-error { color:#f87171; font-size:.82rem; text-align:center; margin-top:12px; display:none; padding:10px; background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.2); border-radius:var(--r-sm); }

    /* ===== DASHBOARD ===== */
    #dashPage { display:none; }
    .container { max-width:1440px; margin:0 auto; padding:40px 28px; }

    /* Header */
    .dash-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:36px; padding-bottom:24px; border-bottom:1px solid var(--border);
      flex-wrap:wrap; gap:16px;
      animation:fadeDown .4s ease;
    }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
    .header-left { display:flex; align-items:center; gap:16px; }
    .header-icon {
      width:52px; height:52px; background:var(--grad-pre); border-radius:var(--r-md);
      display:flex; align-items:center; justify-content:center; font-size:26px;
      box-shadow:0 4px 20px rgba(124,58,237,.3),inset 0 1px 0 rgba(255,255,255,.2);
    }
    .header-title { font-size:1.6rem; font-weight:800; letter-spacing:-.03em; }
    .header-sub { font-size:.8rem; color:var(--text-3); margin-top:3px; }
    .header-actions { display:flex; gap:10px; }
    .btn {
      padding:10px 18px; border:none; border-radius:var(--r-sm);
      font-size:.82rem; font-weight:500; cursor:pointer; font-family:inherit;
      transition:all .2s; display:flex; align-items:center; gap:6px;
    }
    .btn:hover { transform:translateY(-1px); }
    .btn-primary { background:var(--grad-pre); color:white; box-shadow:0 2px 12px rgba(124,58,237,.3),inset 0 1px 0 rgba(255,255,255,.2); }
    .btn-logout { background:var(--glass); color:var(--text-2); border:1px solid var(--border); backdrop-filter:blur(10px); }
    .btn-logout:hover { color:var(--text-1); border-color:var(--border-strong); }

    /* Tabs */
    .tabs {
      display:flex; gap:4px; margin-bottom:32px;
      background:var(--glass); backdrop-filter:blur(16px);
      padding:5px; border-radius:var(--r-md); border:1px solid var(--border);
      width:fit-content;
    }
    .tab-btn {
      padding:10px 24px; border:none; border-radius:var(--r-sm);
      font-size:.85rem; font-weight:500; cursor:pointer; font-family:inherit;
      transition:all .2s; color:var(--text-3); background:transparent;
    }
    .tab-btn.active-pre  { background:var(--grad-pre);  color:white; box-shadow:0 2px 12px rgba(124,58,237,.3); }
    .tab-btn.active-post { background:var(--grad-post); color:white; box-shadow:0 2px 12px rgba(16,185,129,.3); }
    .tab-btn:not(.active-pre):not(.active-post):hover { color:var(--text-2); background:var(--glass-hover); }

    /* Tab content */
    .tab-content { display:none; animation:fadeUp .3s ease; }
    .tab-content.active { display:block; }

    /* Bento stat cards */
    .bento-stats {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
      gap:14px; margin-bottom:28px;
    }
    .stat-card {
      background:var(--glass); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border:1px solid var(--border); border-radius:var(--r-lg);
      padding:24px 20px; transition:all .3s; cursor:default;
    }
    .stat-card:hover { border-color:var(--border-strong); transform:translateY(-2px); }
    .stat-card .stat-label { font-size:.75rem; font-weight:500; color:var(--text-3); margin-bottom:10px; letter-spacing:.02em; }
    .stat-card .stat-value { font-size:2.8rem; font-weight:800; letter-spacing:-.03em; line-height:1; }
    .val-pre  { background:var(--grad-pre);  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .val-post { background:var(--grad-post); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

    /* Questions grid */
    .questions-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; margin-bottom:28px; }
    .question-card {
      background:var(--glass); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border:1px solid var(--border); border-radius:var(--r-lg);
      padding:24px; transition:all .3s;
    }
    .question-card:hover { border-color:var(--border-strong); }
    .question-card h3 {
      font-size:.95rem; font-weight:600; margin-bottom:20px;
      display:flex; align-items:center; gap:10px; color:var(--text-1);
    }
    .question-card h3::before { content:''; width:3px; height:18px; background:var(--grad-pre); border-radius:2px; flex-shrink:0; }
    .question-card.post h3::before { background:var(--grad-post); }

    .option-row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.05); }
    .option-row:last-child { border-bottom:none; }
    .option-label-text { font-size:.8rem; color:var(--text-2); flex:0 0 auto; min-width:0; max-width:140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .bar-track { flex:1; height:5px; background:rgba(255,255,255,.06); border-radius:3px; overflow:hidden; }
    .bar-fill-pre  { height:100%; background:var(--grad-pre);  border-radius:3px; transition:width .8s cubic-bezier(.4,0,.2,1); min-width:2px; }
    .bar-fill-post { height:100%; background:var(--grad-post); border-radius:3px; transition:width .8s cubic-bezier(.4,0,.2,1); min-width:2px; }
    .opt-count { font-size:.8rem; font-weight:600; color:var(--text-1); min-width:20px; text-align:right; }

    /* Open responses */
    .open-section {
      background:var(--glass); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border:1px solid var(--border); border-radius:var(--r-lg);
      padding:24px 28px; margin-bottom:16px;
    }
    .open-section h2 { font-size:1rem; font-weight:600; margin-bottom:18px; display:flex; align-items:center; gap:8px; }
    .open-item {
      padding:14px 16px; background:rgba(255,255,255,.03);
      border-radius:var(--r-sm); margin-bottom:8px;
      border-left:3px solid rgba(124,58,237,.5);
      transition:background .2s;
    }
    .open-item:hover { background:rgba(255,255,255,.05); }
    .open-item.post { border-left-color:rgba(16,185,129,.5); }
    .open-item .idx { font-size:.68rem; font-weight:700; color:#a78bfa; letter-spacing:.06em; text-transform:uppercase; margin-bottom:5px; }
    .open-item.post .idx { color:#6ee7b7; }
    .open-item .text { font-size:.88rem; color:var(--text-2); line-height:1.7; }

    /* Loading */
    .loading { text-align:center; padding:72px 0; color:var(--text-3); }
    .spinner {
      width:36px; height:36px; border:3px solid rgba(255,255,255,.08);
      border-top-color:var(--purple); border-radius:50%;
      margin:0 auto 16px; animation:spin .7s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading p { font-size:.88rem; }

    .error-state { text-align:center; padding:60px 0; color:#f87171; font-size:.9rem; }

    .empty-state { text-align:center; padding:48px; color:var(--text-3); font-size:.88rem; grid-column:1/-1; }

    @media(max-width:768px) {
      .container{padding:24px 16px;}
      .dash-header{flex-direction:column;text-align:center;}
      .questions-grid{grid-template-columns:1fr;}
      .tabs{width:100%;}
      .tab-btn{flex:1;text-align:center;}
    }
  </style>
</head>
<body>
  <div class="aurora"><div class="aurora-blob"></div><div class="aurora-blob"></div></div>
  <div class="grid-bg"></div>

  <!-- LOGIN -->
  <div id="loginPage">
    <div class="login-card">
      <div class="login-icon">🔐</div>
      <h2>後台管理</h2>
      <p>請輸入管理員帳號密碼</p>
      <form id="loginForm">
        <div class="form-group">
          <label>帳號</label>
          <input type="text" id="username" placeholder="admin" autocomplete="username">
        </div>
        <div class="form-group">
          <label>密碼</label>
          <input type="password" id="password" placeholder="••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">登入後台</button>
        <div class="login-error" id="loginError">帳號或密碼錯誤</div>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashPage">
    <div class="container">
      <div class="dash-header">
        <div class="header-left">
          <div class="header-icon">📊</div>
          <div>
            <div class="header-title">問卷統計儀表板</div>
            <div class="header-sub">課前 &amp; 課後問卷資料</div>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn btn-primary" onclick="loadAll()">🔄 重新整理</button>
          <button class="btn btn-logout" onclick="logout()">登出</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active-pre" id="tabPre" onclick="switchTab('pre')">📋 課前問卷</button>
        <button class="tab-btn" id="tabPost" onclick="switchTab('post')">✅ 課後問卷</button>
      </div>

      <!-- PRE -->
      <div class="tab-content active" id="contentPre">
        <div id="loadingPre" class="loading"><div class="spinner"></div><p>讀取課前資料...</p></div>
        <div id="dataPre" style="display:none;">
          <div class="bento-stats">
            <div class="stat-card"><div class="stat-label">課前填寫人數</div><div class="stat-value val-pre" id="preTotal">0</div></div>
          </div>
          <div class="questions-grid" id="preGrid"></div>
          <div class="open-section">
            <h2>💭 期望學習內容</h2>
            <div id="preLearnList"></div>
          </div>
          <div class="open-section">
            <h2>⚡ 寫程式困難</h2>
            <div id="preDiffList"></div>
          </div>
        </div>
        <div id="errorPre" class="error-state" style="display:none;"></div>
      </div>

      <!-- POST -->
      <div class="tab-content" id="contentPost">
        <div id="loadingPost" class="loading"><div class="spinner"></div><p>讀取課後資料...</p></div>
        <div id="dataPost" style="display:none;">
          <div class="bento-stats">
            <div class="stat-card"><div class="stat-label">課後填寫人數</div><div class="stat-value val-post" id="postTotal">0</div></div>
          </div>
          <div class="questions-grid" id="postGrid"></div>
          <div class="open-section">
            <h2>⭐ 最喜歡的部分</h2>
            <div id="postBestList"></div>
          </div>
          <div class="open-section">
            <h2>🔧 需要改進的地方</h2>
            <div id="postImproveList"></div>
          </div>
          <div class="open-section">
            <h2>🚀 希望增加的主題</h2>
            <div id="postFutureList"></div>
          </div>
        </div>
        <div id="errorPost" class="error-state" style="display:none;"></div>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'admin123456';
    const PRE_SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbyXDP5xSEVw9-KQxY6_gQLtCL6FxyhUUvBziVr5AmCZlBF5i2EN-YeWxtTThEXWWGCxFw/exec';
    const POST_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxPxyjS-Qo0zBEEeugFHzrsGyvB5hRU3HYMFbsdn8kCye06fBsXk3fLAeUIK2BQLM1d/exec';

    const preQuestions = {
      github:   { title: 'GitHub 帳號註冊與使用', options: ['完全不熟悉','聽過但沒用過','曾經註冊過帳號','熟悉 Repo 建立與 Push'] },
      vscode:   { title: 'VS Code 安裝與操作',   options: ['沒安裝過 VS Code','安裝過但不常用','熟悉基本操作（開檔案、編輯程式）','熟悉插件安裝與設定'] },
      aicoding: { title: 'AI Coding 擴充元件',   options: ['沒聽過','聽過但沒用過','安裝過但不熟悉功能','熟悉並常用'] },
      pages:    { title: 'GitHub Pages 部署網站', options: ['完全不熟悉','知道有這功能但沒用過','曾經部署過網站','熟悉部署流程並能獨立完成'] }
    };

    const postQuestions = {
      understanding: { title: '課程內容理解程度',   options: ['完全聽不懂','部分理解','大部分理解','完全理解並能應用'] },
      usefulness:    { title: '課程實用性',         options: ['沒什麼幫助','有一些幫助','很有幫助','對我非常有價值'] },
      pace:          { title: '課程節奏',           options: ['太快','剛好','太慢'] },
      skill:         { title: '工具與技術熟悉度提升', options: ['沒有提升','有一點提升','提升很多','已經能獨立操作'] }
    };

    if (sessionStorage.getItem('adminAuth') === '1') {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('dashPage').style.display = 'block';
      loadAll();
    }

    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        sessionStorage.setItem('adminAuth', '1');
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashPage').style.display = 'block';
        loadAll();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    });

    function logout() { sessionStorage.removeItem('adminAuth'); window.location.href = 'index.html'; }

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById('contentPre').classList.toggle('active', tab === 'pre');
      document.getElementById('contentPost').classList.toggle('active', tab === 'post');
      document.getElementById('tabPre').className  = 'tab-btn' + (tab === 'pre'  ? ' active-pre'  : '');
      document.getElementById('tabPost').className = 'tab-btn' + (tab === 'post' ? ' active-post' : '');
    }

    async function loadAll() { loadPre(); loadPost(); }

    async function loadPre() {
      show('loadingPre'); hide('dataPre'); hide('errorPre');
      try {
        const res = await fetch(PRE_SCRIPT_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        document.getElementById('preTotal').textContent = data.length;
        renderGrid('preGrid', data, preQuestions, 'pre');
        renderOpenList('preLearnList', data, 'learn', 'pre');
        renderOpenList('preDiffList', data, 'difficulty', 'pre');
        hide('loadingPre'); show('dataPre');
      } catch (err) {
        hide('loadingPre');
        const el = document.getElementById('errorPre');
        el.textContent = '❌ 課前資料讀取失敗：' + err.message;
        show('errorPre');
      }
    }

    async function loadPost() {
      show('loadingPost'); hide('dataPost'); hide('errorPost');
      try {
        const res = await fetch(POST_SCRIPT_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        document.getElementById('postTotal').textContent = data.length;
        renderGrid('postGrid', data, postQuestions, 'post');
        renderOpenList('postBestList', data, 'best', 'post');
        renderOpenList('postImproveList', data, 'improve', 'post');
        renderOpenList('postFutureList', data, 'future', 'post');
        hide('loadingPost'); show('dataPost');
      } catch (err) {
        hide('loadingPost');
        const el = document.getElementById('errorPost');
        el.textContent = '❌ 課後資料讀取失敗：' + err.message;
        show('errorPost');
      }
    }

    function renderGrid(gridId, responses, questions, type) {
      const grid = document.getElementById(gridId);
      grid.innerHTML = '';
      Object.keys(questions).forEach(key => {
        const q = questions[key];
        const counts = {};
        q.options.forEach(o => counts[o] = 0);
        responses.forEach(r => { if (r[key] && counts.hasOwnProperty(r[key])) counts[r[key]]++; });
        const max = Math.max(...Object.values(counts), 1);
        let html = `<div class="question-card ${type}"><h3>${q.title}</h3>`;
        q.options.forEach(opt => {
          const c = counts[opt] || 0;
          const pct = (c / max) * 100;
          html += `<div class="option-row">
            <span class="option-label-text" title="${opt}">${opt}</span>
            <div class="bar-track"><div class="bar-fill-${type}" style="width:${pct}%"></div></div>
            <span class="opt-count">${c}</span>
          </div>`;
        });
        html += '</div>';
        grid.innerHTML += html;
      });
      if (!grid.innerHTML) grid.innerHTML = '<p class="empty-state">目前尚無資料</p>';
    }

    function renderOpenList(listId, responses, field, type) {
      const el = document.getElementById(listId);
      el.innerHTML = '';
      let has = false;
      responses.forEach((r, i) => {
        if (r[field] && r[field].trim()) {
          has = true;
          el.innerHTML += `<div class="open-item ${type}">
            <div class="idx">Response #${i + 1}</div>
            <div class="text">${escapeHtml(r[field])}</div>
          </div>`;
        }
      });
      if (!has) el.innerHTML = '<p style="text-align:center;color:var(--text-3);padding:20px 0;font-size:.85rem;">目前尚無資料</p>';
    }

    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function show(id) { document.getElementById(id).style.display = 'block'; }
    function hide(id) { document.getElementById(id).style.display = 'none'; }
  </script>
</body>
</html>
