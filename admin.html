<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台管理 - 問卷統計</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a25;
      --border-color: #2a2a3a;
      --border-glow: #6366f1;
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --text-muted: #555568;
      --accent-primary: #6366f1;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
      --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    body {
      font-family: 'Inter', 'Microsoft JhengHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
      z-index: -1;
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 40px 24px; }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid var(--border-color);
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    .header-icon {
      width: 48px; height: 48px; background: var(--gradient-primary);
      border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center;
      font-size: 24px; box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
    }

    .header h1 {
      font-size: 1.75rem; font-weight: 700;
      background: linear-gradient(135deg, #f0f0f5 0%, #8888a0 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .header-subtitle { font-size: 0.875rem; color: var(--text-muted); margin-top: 2px; }

    .header-actions { display: flex; gap: 12px; }

    .btn {
      padding: 10px 20px; border: none; border-radius: var(--radius-sm);
      font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 8px; font-family: inherit;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: var(--gradient-primary); color: white;
      box-shadow: 0 2px 12px rgba(99, 102, 241, 0.3);
    }

    .stats-overview {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 32px;
    }

    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius-lg); padding: 24px; transition: all 0.3s;
    }

    .stat-card:hover { border-color: var(--border-glow); box-shadow: var(--shadow-glow); }

    .stat-card .label { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 8px; }

    .stat-card .value {
      font-size: 2.5rem; font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .questions-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px; margin-bottom: 32px;
    }

    .question-card {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius-lg); padding: 24px; transition: all 0.3s;
    }

    .question-card:hover { border-color: var(--border-glow); box-shadow: var(--shadow-glow); }

    .question-card h3 {
      font-size: 1rem; font-weight: 600; margin-bottom: 20px; color: var(--text-primary);
      display: flex; align-items: center; gap: 10px;
    }

    .question-card h3::before {
      content: ''; width: 4px; height: 20px; background: var(--gradient-primary); border-radius: 2px;
    }

    .option-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--border-color);
    }

    .option-row:last-child { border-bottom: none; }

    .option-label { font-size: 0.875rem; color: var(--text-secondary); flex: 1; }

    .option-bar-wrapper {
      flex: 1; margin: 0 16px; height: 6px; background: var(--bg-secondary);
      border-radius: 3px; overflow: hidden;
    }

    .option-bar {
      height: 100%; background: var(--gradient-primary); border-radius: 3px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); min-width: 2px;
    }

    .option-count {
      font-size: 0.875rem; font-weight: 600; color: var(--text-primary);
      min-width: 24px; text-align: right;
    }

    .open-section {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius-lg); padding: 28px; margin-bottom: 24px;
    }

    .open-section h2 {
      font-size: 1.125rem; font-weight: 600; margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }

    .open-item {
      padding: 16px; background: var(--bg-secondary); border-radius: var(--radius-sm);
      margin-bottom: 12px; border-left: 3px solid var(--accent-primary);
    }

    .open-item .index {
      font-size: 0.75rem; color: var(--accent-primary); font-weight: 600;
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
    }

    .open-item .text { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.7; }

    .loading { text-align: center; padding: 60px; color: var(--text-muted); }
    .loading .spinner {
      width: 40px; height: 40px; border: 4px solid var(--border-color);
      border-top-color: var(--accent-primary); border-radius: 50%;
      margin: 0 auto 16px; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .nav-link {
      text-align: center; margin-top: 40px; padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }

    .nav-link a { color: var(--accent-primary); text-decoration: none; font-size: 0.875rem; font-weight: 500; }

    @media (max-width: 768px) {
      .container { padding: 24px 16px; }
      .header { flex-direction: column; gap: 20px; text-align: center; }
      .questions-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="header-icon">📊</div>
        <div>
          <h1>問卷統計儀表板</h1>
          <p class="header-subtitle">Live Data from Google Sheets</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="loadData()">🔄 重新整理</button>
      </div>
    </div>

    <div id="loadingState" class="loading">
      <div class="spinner"></div>
      <p>正在讀取 Google Sheets 資料...</p>
    </div>

    <div id="contentState" style="display: none;">
      <div class="stats-overview">
        <div class="stat-card">
          <div class="label">總提交數</div>
          <div class="value" id="totalCount">0</div>
        </div>
      </div>

      <div class="questions-grid" id="statsGrid"></div>

      <div class="open-section">
        <h2>💭 期望學習內容</h2>
        <div id="learnList"></div>
      </div>

      <div class="open-section">
        <h2>⚡ 寫程式困難</h2>
        <div id="difficultyList"></div>
      </div>
    </div>

    <div class="nav-link">
      <a href="index.html">← 返回問卷填寫頁面</a>
    </div>
  </div>

  <script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2i1fgGlYIxFSgLWChMBfSTBthtWasJJ3VNDsAT9p3hY9CFuTfMDGoM4jShDrAcRc3Pb05ye3WW9ah/pub?output=csv';

    const questions = {
      github: {
        title: 'GitHub 帳號註冊與使用',
        options: ['完全不熟悉', '聽過但沒用過', '曾經註冊過帳號', '熟悉 Repo 建立與 Push']
      },
      vscode: {
        title: 'VS Code 安裝與操作',
        options: ['沒安裝過 VS Code', '安裝過但不常用', '熟悉基本操作（開檔案、編輯程式）', '熟悉插件安裝與設定']
      },
      qwen: {
        title: 'Qwen Code 擴充元件',
        options: ['沒聽過', '聽過但沒用過', '安裝過但不熟悉功能', '熟悉並常用']
      },
      pages: {
        title: 'GitHub Pages 部署網站',
        options: ['完全不熟悉', '知道有這功能但沒用過', '曾經部署過網站', '熟悉部署流程並能獨立完成']
      }
    };

    // 解析 Google Sheets CSV
    function parseCSV(csvText) {
      const lines = csvText.trim().split('\n');
      if (lines.length < 2) return [];
      
      const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
      const result = [];
      
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i];
        if (!line.trim()) continue;
        
        // 簡單按逗號分割
        const values = line.split(',');
        const row = {};
        
        headers.forEach((h, idx) => {
          row[h] = values[idx] ? values[idx].trim() : '';
        });
        
        result.push({
          github: row['github'] || '',
          vscode: row['vscode'] || '',
          qwen: row['qwen'] || '',
          pages: row['pages'] || '',
          learn: row['learn'] || '',
          difficulty: row['difficulty'] || '',
          timestamp: row['timestamp'] || ''
        });
      }
      return result;
    }

    async function loadData() {
      document.getElementById('loadingState').style.display = 'block';
      document.getElementById('contentState').style.display = 'none';

      try {
        const res = await fetch(SHEET_CSV_URL);
        if (!res.ok) throw new Error('無法讀取資料');
        const text = await res.text();
        const responses = parseCSV(text);

        document.getElementById('totalCount').textContent = responses.length;

        if (responses.length === 0) {
          document.getElementById('statsGrid').innerHTML = '<p style="text-align:center; color:var(--text-muted); grid-column:1/-1; padding:40px;">目前尚無資料</p>';
          document.getElementById('learnList').innerHTML = '<p style="text-align:center; color:var(--text-muted);">目前尚無資料</p>';
          document.getElementById('difficultyList').innerHTML = '<p style="text-align:center; color:var(--text-muted);">目前尚無資料</p>';
        } else {
          renderStats(responses);
          renderOpenQuestions(responses);
        }

        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('contentState').style.display = 'block';

      } catch (error) {
        document.getElementById('loadingState').innerHTML = `
          <p style="color:var(--accent-red);">❌ 讀取失敗：${error.message}</p>`;
      }
    }

    function renderStats(responses) {
      const grid = document.getElementById('statsGrid');
      grid.innerHTML = '';

      Object.keys(questions).forEach(key => {
        const q = questions[key];
        const counts = {};
        q.options.forEach(o => counts[o] = 0);
        
        responses.forEach(r => {
          if (r[key] && counts.hasOwnProperty(r[key])) counts[r[key]]++;
        });

        const max = Math.max(...Object.values(counts), 1);
        let html = `<div class="question-card"><h3>${q.title}</h3>`;
        
        q.options.forEach(opt => {
          const c = counts[opt] || 0;
          const pct = (c / max) * 100;
          html += `
            <div class="option-row">
              <span class="option-label">${opt}</span>
              <div class="option-bar-wrapper"><div class="option-bar" style="width:${pct}%"></div></div>
              <span class="option-count">${c}</span>
            </div>`;
        });
        html += '</div>';
        grid.innerHTML += html;
      });
    }

    function renderOpenQuestions(responses) {
      const learnList = document.getElementById('learnList');
      const difficultyList = document.getElementById('difficultyList');
      learnList.innerHTML = '';
      difficultyList.innerHTML = '';

      let hasLearn = false, hasDiff = false;

      responses.forEach((r, i) => {
        if (r.learn) {
          hasLearn = true;
          learnList.innerHTML += `<div class="open-item"><div class="index">Response #${i + 1}</div><div class="text">${escapeHtml(r.learn)}</div></div>`;
        }
        if (r.difficulty) {
          hasDiff = true;
          difficultyList.innerHTML += `<div class="open-item"><div class="index">Response #${i + 1}</div><div class="text">${escapeHtml(r.difficulty)}</div></div>`;
        }
      });

      if (!hasLearn) learnList.innerHTML = '<p style="text-align:center; color:var(--text-muted);">目前尚無資料</p>';
      if (!hasDiff) difficultyList.innerHTML = '<p style="text-align:center; color:var(--text-muted);">目前尚無資料</p>';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadData();
  </script>
</body>
</html>
