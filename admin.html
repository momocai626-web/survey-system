<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台管理 - 問卷統計</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a25;
      --bg-card-hover: #1f1f2e;
      --border-color: #2a2a3a;
      --border-glow: #6366f1;
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --text-muted: #555568;
      --accent-primary: #6366f1;
      --accent-secondary: #8b5cf6;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --accent-orange: #f59e0b;
      --accent-blue: #3b82f6;
      --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
      --gradient-green: linear-gradient(135deg, #10b981 0%, #34d399 100%);
      --gradient-red: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
      --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
    }

    body {
      font-family: 'Inter', 'Microsoft JhengHei', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
      z-index: -1;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-icon {
      width: 48px;
      height: 48px;
      background: var(--gradient-primary);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f0f0f5 0%, #8888a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: var(--gradient-primary);
      color: white;
      box-shadow: 0 2px 12px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:hover {
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
    }

    .btn-success {
      background: var(--gradient-green);
      color: white;
      box-shadow: 0 2px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-danger {
      background: var(--bg-card);
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    .btn-danger:hover {
      background: var(--accent-red);
      color: white;
      border-color: var(--accent-red);
    }

    /* Stats Overview */
    .stats-overview {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: all 0.3s;
    }

    .stat-card:hover {
      border-color: var(--border-glow);
      box-shadow: var(--shadow-glow);
    }

    .stat-card .label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 2.5rem;
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Question Cards Grid */
    .questions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .question-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: all 0.3s;
    }

    .question-card:hover {
      border-color: var(--border-glow);
      box-shadow: var(--shadow-glow);
    }

    .question-card h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .question-card h3::before {
      content: '';
      width: 4px;
      height: 20px;
      background: var(--gradient-primary);
      border-radius: 2px;
    }

    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .option-row:last-child {
      border-bottom: none;
    }

    .option-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      flex: 1;
    }

    .option-bar-wrapper {
      flex: 1;
      margin: 0 16px;
      height: 6px;
      background: var(--bg-secondary);
      border-radius: 3px;
      overflow: hidden;
    }

    .option-bar {
      height: 100%;
      background: var(--gradient-primary);
      border-radius: 3px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 2px;
    }

    .option-count {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
      min-width: 24px;
      text-align: right;
    }

    /* Open Questions Section */
    .open-section {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-bottom: 24px;
    }

    .open-section h2 {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .open-section h2 .icon {
      font-size: 1.25rem;
    }

    .open-item {
      padding: 16px;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
      border-left: 3px solid var(--accent-primary);
    }

    .open-item .index {
      font-size: 0.75rem;
      color: var(--accent-primary);
      font-weight: 600;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .open-item .text {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    /* Login Section */
    .login-box {
      max-width: 420px;
      margin: 15vh auto;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: 48px;
      box-shadow: var(--shadow-lg);
    }

    .login-box h2 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }

    .login-box .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 0.9rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--gradient-primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      font-family: inherit;
    }

    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
    }

    .error-msg {
      color: var(--accent-red);
      font-size: 0.875rem;
      text-align: center;
      margin-top: 16px;
      display: none;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 1rem;
    }

    /* Nav Link */
    .nav-link {
      text-align: center;
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }

    .nav-link a {
      color: var(--accent-primary);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-link a:hover {
      color: var(--accent-secondary);
    }

    /* Admin content hidden by default */
    .admin-content {
      display: none;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .admin-content > * {
      animation: fadeIn 0.4s ease-out;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 24px 16px;
      }

      .header {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }

      .header-actions {
        width: 100%;
        justify-content: center;
      }

      .questions-grid {
        grid-template-columns: 1fr;
      }

      .login-box {
        margin: 10vh auto;
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="header-icon">📊</div>
        <div>
          <h1>問卷統計儀表板</h1>
          <p class="header-subtitle">Survey System Admin Dashboard</p>
        </div>
      </div>
    </div>

    <!-- Login Section -->
    <div id="loginSection" class="login-box">
      <h2>🔐 講師登入</h2>
      <p class="subtitle">請輸入管理員帳號以查看統計資料</p>
      <div class="form-group">
        <label>帳號</label>
        <input type="text" id="usernameInput" placeholder="輸入帳號" autocomplete="username">
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="passwordInput" placeholder="輸入密碼" autocomplete="current-password">
      </div>
      <button class="login-btn" id="loginBtn" onclick="login()">登入系統</button>
      <p id="errorMsg" class="error-msg">帳號或密碼錯誤，請重試</p>
    </div>

    <!-- Admin Content -->
    <div id="adminSection" class="admin-content">
      <!-- Action Bar -->
      <div class="header-actions" style="justify-content: flex-end; margin-bottom: 24px;">
        <button class="btn btn-primary" onclick="loadData()">🔄 重新載入</button>
        <button class="btn btn-success" onclick="downloadCSV()">📥 下載 CSV</button>
        <button class="btn btn-danger" onclick="logout()">登出</button>
      </div>

      <!-- Stats Overview -->
      <div class="stats-overview">
        <div class="stat-card">
          <div class="label">總提交數</div>
          <div class="value" id="totalCount">0</div>
        </div>
      </div>

      <!-- Questions Grid -->
      <div class="questions-grid" id="statsGrid">
        <!-- Generated by JavaScript -->
      </div>

      <!-- Open Questions -->
      <div class="open-section">
        <h2><span class="icon">💭</span> 期望學習內容</h2>
        <div id="learnList"></div>
      </div>

      <div class="open-section">
        <h2><span class="icon">⚡</span> 寫程式困難</h2>
        <div id="difficultyList"></div>
      </div>

      <!-- Nav Link -->
      <div class="nav-link">
        <a href="index.html">← 返回問卷填寫頁面</a>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'survey_responses';
    const ADMIN_USERNAME = 'admin';
    const ADMIN_PASSWORD = '123456';

    const questions = {
      github: {
        title: 'GitHub 帳號註冊與使用',
        options: ['完全不熟悉', '聽過但沒用過', '曾經註冊過帳號', '熟悉 Repo 建立與 Push']
      },
      vscode: {
        title: 'VS Code 安裝與操作',
        options: ['沒安裝過 VS Code', '安裝過但不常用', '熟悉基本操作（開檔案、編輯程式）', '熟悉插件安裝與設定']
      },
      qwen: {
        title: 'Qwen Code 擴充元件',
        options: ['沒聽過', '聽過但沒用過', '安裝過但不熟悉功能', '熟悉並常用']
      },
      pages: {
        title: 'GitHub Pages 部署網站',
        options: ['完全不熟悉', '知道有這功能但沒用過', '曾經部署過網站', '熟悉部署流程並能獨立完成']
      }
    };

    function login() {
      const username = document.getElementById('usernameInput').value;
      const password = document.getElementById('passwordInput').value;
      const errorMsg = document.getElementById('errorMsg');

      if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('adminSection').style.display = 'block';
        errorMsg.style.display = 'none';
        loadData();
      } else {
        errorMsg.style.display = 'block';
      }
    }

    function logout() {
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('adminSection').style.display = 'none';
      document.getElementById('usernameInput').value = '';
      document.getElementById('passwordInput').value = '';
      document.getElementById('statsGrid').innerHTML = '';
    }

    function loadData() {
      const responses = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      document.getElementById('totalCount').textContent = responses.length;

      if (responses.length === 0) {
        document.getElementById('statsGrid').innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <div class="icon">📭</div>
            <p>目前尚無問卷資料</p>
          </div>`;
        document.getElementById('learnList').innerHTML = '<p style="color: var(--text-muted); text-align: center;">目前尚無資料</p>';
        document.getElementById('difficultyList').innerHTML = '<p style="color: var(--text-muted); text-align: center;">目前尚無資料</p>';
        return;
      }

      renderStats(responses);
      renderOpenQuestions(responses);
    }

    function renderStats(responses) {
      const grid = document.getElementById('statsGrid');
      grid.innerHTML = '';

      Object.keys(questions).forEach(key => {
        const question = questions[key];
        const counts = {};
        question.options.forEach(opt => counts[opt] = 0);

        responses.forEach(r => {
          if (counts.hasOwnProperty(r[key])) {
            counts[r[key]]++;
          }
        });

        const maxCount = Math.max(...Object.values(counts), 1);

        let html = `
          <div class="question-card">
            <h3>${question.title}</h3>`;

        question.options.forEach(opt => {
          const count = counts[opt];
          const percentage = (count / maxCount) * 100;
          html += `
            <div class="option-row">
              <span class="option-label">${opt}</span>
              <div class="option-bar-wrapper">
                <div class="option-bar" style="width: ${percentage}%"></div>
              </div>
              <span class="option-count">${count}</span>
            </div>`;
        });

        html += `</div>`;
        grid.innerHTML += html;
      });
    }

    function renderOpenQuestions(responses) {
      const learnList = document.getElementById('learnList');
      const difficultyList = document.getElementById('difficultyList');
      learnList.innerHTML = '';
      difficultyList.innerHTML = '';

      let hasLearn = false;
      let hasDifficulty = false;

      responses.forEach((r, index) => {
        if (r.learn) {
          hasLearn = true;
          learnList.innerHTML += `
            <div class="open-item">
              <div class="index">Response #${index + 1}</div>
              <div class="text">${escapeHtml(r.learn)}</div>
            </div>`;
        }
        if (r.difficulty) {
          hasDifficulty = true;
          difficultyList.innerHTML += `
            <div class="open-item">
              <div class="index">Response #${index + 1}</div>
              <div class="text">${escapeHtml(r.difficulty)}</div>
            </div>`;
        }
      });

      if (!hasLearn) learnList.innerHTML = '<p style="color: var(--text-muted); text-align: center;">目前尚無資料</p>';
      if (!hasDifficulty) difficultyList.innerHTML = '<p style="color: var(--text-muted); text-align: center;">目前尚無資料</p>';
    }

    function downloadCSV() {
      const responses = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      if (responses.length === 0) { alert('目前沒有資料可下載'); return; }

      const headers = ['GitHub', 'VSCode', 'Qwen', 'Pages', '期望學習內容', '寫程式困難', '提交時間'];
      const csvRows = [headers.join(',')];

      responses.forEach(r => {
        csvRows.push([
          escapeCSV(r.github), escapeCSV(r.vscode), escapeCSV(r.qwen),
          escapeCSV(r.pages), escapeCSV(r.learn), escapeCSV(r.difficulty),
          escapeCSV(r.timestamp)
        ].join(','));
      });

      const blob = new Blob(['\ufeff' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `survey_results_${new Date().toISOString().slice(0,10)}.csv`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function escapeCSV(field) {
      if (!field) return '';
      const str = String(field);
      if (str.includes(',') || str.includes('"') || str.includes('\n')) {
        return `"${str.replace(/"/g, '""')}"`;
      }
      return str;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('passwordInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
    document.getElementById('usernameInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('passwordInput').focus();
    });
  </script>
</body>
</html>
