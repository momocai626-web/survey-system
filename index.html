<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課程前測問卷調查</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft JhengHei', 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 2em;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }

    .question {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
    }

    .question h3 {
      color: #333;
      margin-bottom: 15px;
      font-size: 1.1em;
    }

    .options label {
      display: block;
      padding: 12px 15px;
      margin: 8px 0;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .options label:hover {
      background: #e9ecef;
      transform: translateX(5px);
    }

    .options input[type="radio"] {
      margin-right: 10px;
    }

    textarea {
      width: 100%;
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1em;
      resize: vertical;
      min-height: 100px;
      transition: border-color 0.3s;
      font-family: inherit;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn-group {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    .btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 1.1em;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .btn-submit {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-download {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      color: white;
    }

    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(40, 167, 69, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      text-align: center;
      padding: 15px;
      margin-top: 20px;
      border-radius: 8px;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }

    .required {
      color: #dc3545;
    }

    .nav-link {
      text-align: center;
      margin-top: 20px;
    }

    .nav-link a {
      color: #667eea;
      text-decoration: none;
    }

    .nav-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 1.5em;
      }

      .btn-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 課程前測問卷調查</h1>
    <p class="subtitle">請填寫以下問卷，幫助我們更好地了解你的需求</p>

    <form id="surveyForm">
      <!-- GitHub 題目 -->
      <div class="question">
        <h3>1. 你對 GitHub 帳號註冊與使用的熟悉度？ <span class="required">*</span></h3>
        <div class="options">
          <label><input type="radio" name="github" value="完全不熟悉" required> 完全不熟悉</label>
          <label><input type="radio" name="github" value="聽過但沒用過"> 聽過但沒用過</label>
          <label><input type="radio" name="github" value="曾經註冊過帳號"> 曾經註冊過帳號</label>
          <label><input type="radio" name="github" value="熟悉 Repo 建立與 Push"> 熟悉 Repo 建立與 Push</label>
        </div>
      </div>

      <!-- VS Code 題目 -->
      <div class="question">
        <h3>2. 你對 VS Code 安裝與操作的熟悉度？ <span class="required">*</span></h3>
        <div class="options">
          <label><input type="radio" name="vscode" value="沒安裝過 VS Code" required> 沒安裝過 VS Code</label>
          <label><input type="radio" name="vscode" value="安裝過但不常用"> 安裝過但不常用</label>
          <label><input type="radio" name="vscode" value="熟悉基本操作（開檔案、編輯程式）"> 熟悉基本操作（開檔案、編輯程式）</label>
          <label><input type="radio" name="vscode" value="熟悉插件安裝與設定"> 熟悉插件安裝與設定</label>
        </div>
      </div>

      <!-- Qwen Code 題目 -->
      <div class="question">
        <h3>3. 你對 Qwen Code 擴充元件的了解程度？ <span class="required">*</span></h3>
        <div class="options">
          <label><input type="radio" name="qwen" value="沒聽過" required> 沒聽過</label>
          <label><input type="radio" name="qwen" value="聽過但沒用過"> 聽過但沒用過</label>
          <label><input type="radio" name="qwen" value="安裝過但不熟悉功能"> 安裝過但不熟悉功能</label>
          <label><input type="radio" name="qwen" value="熟悉並常用"> 熟悉並常用</label>
        </div>
      </div>

      <!-- GitHub Pages 題目 -->
      <div class="question">
        <h3>4. 你對 GitHub Pages 部署網站的了解程度？ <span class="required">*</span></h3>
        <div class="options">
          <label><input type="radio" name="pages" value="完全不熟悉" required> 完全不熟悉</label>
          <label><input type="radio" name="pages" value="知道有這功能但沒用過"> 知道有這功能但沒用過</label>
          <label><input type="radio" name="pages" value="曾經部署過網站"> 曾經部署過網站</label>
          <label><input type="radio" name="pages" value="熟悉部署流程並能獨立完成"> 熟悉部署流程並能獨立完成</label>
        </div>
      </div>

      <!-- 開放式問題 -->
      <div class="question">
        <h3>5. 你希望在課程中學到什麼？</h3>
        <textarea name="learn" placeholder="請輸入你的期望..."></textarea>
      </div>

      <div class="question">
        <h3>6. 你覺得目前寫程式最大的困難是什麼？</h3>
        <textarea name="difficulty" placeholder="請描述你遇到的困難..."></textarea>
      </div>

      <div class="btn-group">
        <button type="submit" class="btn btn-submit" id="submitBtn">提交問卷</button>
        <button type="button" class="btn btn-download" id="downloadBtn">📥 下載 CSV</button>
      </div>

      <div id="message" class="message"></div>
    </form>

    <div class="nav-link">
      <a href="admin.html">前往後台管理 →</a>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'survey_responses';
    const form = document.getElementById('surveyForm');
    const submitBtn = document.getElementById('submitBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const messageDiv = document.getElementById('message');

    // 提交表單
    form.addEventListener('submit', (e) => {
      e.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = '提交中...';
      messageDiv.className = 'message';
      messageDiv.textContent = '';

      // 收集表單資料
      const formData = new FormData(form);
      const response = {
        github: formData.get('github'),
        vscode: formData.get('vscode'),
        qwen: formData.get('qwen'),
        pages: formData.get('pages'),
        learn: formData.get('learn') || '',
        difficulty: formData.get('difficulty') || '',
        timestamp: new Date().toISOString()
      };

      // 儲存到 LocalStorage
      try {
        const responses = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        responses.push(response);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(responses));

        messageDiv.className = 'message success';
        messageDiv.textContent = '✅ 問卷提交成功！感謝你的參與。';
        form.reset();
      } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = '❌ 提交失敗，請重試。';
        console.error('儲存錯誤:', error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '提交問卷';
      }
    });

    // 下載 CSV
    downloadBtn.addEventListener('click', () => {
      const responses = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      
      if (responses.length === 0) {
        messageDiv.className = 'message error';
        messageDiv.textContent = '⚠️ 目前沒有資料可下載';
        return;
      }

      // CSV 標題
      const headers = ['GitHub', 'VSCode', 'Qwen', 'Pages', '期望學習內容', '寫程式困難', '提交時間'];
      
      // CSV 內容
      const csvRows = [headers.join(',')];
      
      responses.forEach(r => {
        const row = [
          escapeCSV(r.github),
          escapeCSV(r.vscode),
          escapeCSV(r.qwen),
          escapeCSV(r.pages),
          escapeCSV(r.learn),
          escapeCSV(r.difficulty),
          escapeCSV(r.timestamp)
        ];
        csvRows.push(row.join(','));
      });

      const csvContent = csvRows.join('\n');
      const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      
      const link = document.createElement('a');
      link.href = url;
      link.download = `survey_results_${new Date().toISOString().slice(0,10)}.csv`;
      link.click();
      
      URL.revokeObjectURL(url);

      messageDiv.className = 'message success';
      messageDiv.textContent = `✅ 已下載 ${responses.length} 筆資料`;
    });

    // CSV 跳脫函數
    function escapeCSV(field) {
      if (!field) return '';
      const str = String(field);
      if (str.includes(',') || str.includes('"') || str.includes('\n')) {
        return `"${str.replace(/"/g, '""')}"`;
      }
      return str;
    }
  </script>
</body>
</html>
