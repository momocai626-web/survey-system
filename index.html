<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課程系統</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a25;
      --border-color: #2a2a3a;
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --text-muted: #555568;
      --gradient-purple: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
      --gradient-green:  linear-gradient(135deg, #10b981 0%, #059669 100%);
      --gradient-blue:   linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
      --gradient-orange: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px;
    }
    body {
      font-family: 'Inter', 'Microsoft JhengHei', sans-serif;
      background: var(--bg-primary); color: var(--text-primary);
      min-height: 100vh; display: flex; flex-direction: column;
    }
    body::before {
      content: ''; position: fixed; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(99,102,241,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(16,185,129,0.07) 0%, transparent 50%);
      z-index: -1;
    }

    /* ── Header ── */
    .site-header {
      text-align: center; padding: 60px 24px 40px;
    }
    .site-header .logo {
      width: 64px; height: 64px; margin: 0 auto 20px;
      background: var(--gradient-purple); border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; box-shadow: 0 0 40px rgba(99,102,241,0.25);
    }
    .site-header h1 {
      font-size: 2rem; font-weight: 800;
      background: linear-gradient(135deg, #f0f0f5 0%, #8888a0 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px;
    }
    .site-header p { color: var(--text-muted); font-size: 0.9rem; }

    /* ── Main layout ── */
    .main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 960px; margin: 0 auto; padding: 0 24px 60px; width: 100%; }

    /* ── Panel ── */
    .panel {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius-xl); padding: 32px; display: flex; flex-direction: column; gap: 20px;
    }
    .panel-header { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; }
    .panel-icon {
      width: 48px; height: 48px; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
    }
    .icon-student { background: var(--gradient-green); box-shadow: 0 0 20px rgba(16,185,129,0.2); }
    .icon-teacher { background: var(--gradient-orange); box-shadow: 0 0 20px rgba(245,158,11,0.2); }
    .panel-title { font-size: 1.25rem; font-weight: 700; }
    .panel-desc { font-size: 0.85rem; color: var(--text-muted); }

    .divider { height: 1px; background: var(--border-color); }

    /* ── Survey cards (student) ── */
    .survey-card {
      display: flex; align-items: center; gap: 14px;
      padding: 16px; border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      text-decoration: none; color: var(--text-primary);
      transition: all 0.2s; cursor: pointer;
    }
    .survey-card:hover { border-color: #4f4f6a; background: rgba(255,255,255,0.03); transform: translateY(-1px); }
    .survey-card .card-icon {
      width: 42px; height: 42px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .card-pre   { background: rgba(99,102,241,0.15); }
    .card-post  { background: rgba(16,185,129,0.15); }
    .card-vital { background: rgba(56,189,248,0.15); }
    .survey-card .card-text .title { font-size: 0.95rem; font-weight: 600; margin-bottom: 2px; }
    .survey-card .card-text .sub   { font-size: 0.8rem; color: var(--text-muted); }
    .survey-card .arrow { margin-left: auto; color: var(--text-muted); font-size: 1rem; }

    /* ── Teacher login ── */
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); }
    .form-group input {
      padding: 12px 14px; background: var(--bg-secondary);
      border: 1px solid var(--border-color); border-radius: var(--radius-sm);
      color: var(--text-primary); font-size: 0.95rem; font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-group input:focus { outline: none; border-color: #f59e0b; }
    .btn-teacher {
      width: 100%; padding: 13px;
      background: var(--gradient-orange);
      border: none; border-radius: var(--radius-sm); color: white;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: all 0.2s; box-shadow: 0 4px 16px rgba(245,158,11,0.25);
    }
    .btn-teacher:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(245,158,11,0.35); }
    .login-error { font-size: 0.85rem; color: #ef4444; text-align: center; display: none; }

    /* ── Modal (student role picker) ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: none; align-items: center; justify-content: center;
      z-index: 100; padding: 24px;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius-xl); padding: 36px; width: 100%; max-width: 440px;
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
    .modal p  { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 24px; }
    .modal-cards { display: flex; flex-direction: column; gap: 12px; }
    .modal-card {
      display: flex; align-items: center; gap: 14px;
      padding: 18px; border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      text-decoration: none; color: var(--text-primary);
      transition: all 0.2s;
    }
    .modal-card:hover { transform: translateY(-2px); }
    .modal-card.pre   { border-color: rgba(99,102,241,0.4);  background: rgba(99,102,241,0.08); }
    .modal-card.post  { border-color: rgba(16,185,129,0.4);  background: rgba(16,185,129,0.08); }
    .modal-card.vital { border-color: rgba(56,189,248,0.4);  background: rgba(56,189,248,0.08); }
    .modal-card .mc-icon { font-size: 28px; }
    .modal-card .mc-title { font-size: 1rem; font-weight: 600; }
    .modal-card .mc-sub   { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
    .modal-close {
      width: 100%; margin-top: 16px; padding: 10px;
      background: transparent; border: 1px solid var(--border-color);
      border-radius: var(--radius-sm); color: var(--text-muted);
      font-size: 0.875rem; cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .modal-close:hover { color: var(--text-primary); border-color: #4f4f6a; }

    @media (max-width: 680px) {
      .main { grid-template-columns: 1fr; }
      .site-header { padding: 40px 24px 28px; }
      .site-header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="site-header">
    <div class="logo">🎓</div>
    <h1>課程學習系統</h1>
    <p>請選擇你的身份登入</p>
  </div>

  <div class="main">

    <!-- 學員 -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-icon icon-student">👨‍🎓</div>
        <div>
          <div class="panel-title">學員入口</div>
          <div class="panel-desc">填寫問卷與課堂練習</div>
        </div>
      </div>
      <div class="divider"></div>
      <a class="survey-card" href="pre.html">
        <div class="card-icon card-pre">📋</div>
        <div class="card-text">
          <div class="title">課前問卷</div>
          <div class="sub">課程開始前填寫</div>
        </div>
        <span class="arrow">›</span>
      </a>
      <a class="survey-card" href="post.html">
        <div class="card-icon card-post">✅</div>
        <div class="card-text">
          <div class="title">課後問卷</div>
          <div class="sub">課程結束後填寫</div>
        </div>
        <span class="arrow">›</span>
      </a>
      <a class="survey-card" href="vital.html">
        <div class="card-icon card-vital">🩺</div>
        <div class="card-text">
          <div class="title">生命徵象量測</div>
          <div class="sub">課堂練習記錄</div>
        </div>
        <span class="arrow">›</span>
      </a>
    </div>

    <!-- 講師 -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-icon icon-teacher">👩‍🏫</div>
        <div>
          <div class="panel-title">講師入口</div>
          <div class="panel-desc">查看問卷統計與資料</div>
        </div>
      </div>
      <div class="divider"></div>
      <form id="loginForm">
        <div style="display:flex; flex-direction:column; gap:16px;">
          <div class="form-group">
            <label>帳號</label>
            <input type="text" id="username" placeholder="admin" autocomplete="username">
          </div>
          <div class="form-group">
            <label>密碼</label>
            <input type="password" id="password" placeholder="••••••" autocomplete="current-password">
          </div>
          <button type="submit" class="btn-teacher">進入後台管理</button>
          <div class="login-error" id="loginError">帳號或密碼錯誤</div>
        </div>
      </form>
    </div>

  </div>

  <script>
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'admin123456';

    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        sessionStorage.setItem('adminAuth', '1');
        window.location.href = 'admin.html';
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    });
  </script>
</body>
</html>
