<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課程學習系統</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #06060f;
      --glass: rgba(255,255,255,0.04);
      --glass-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.16);
      --text-1: #f1f5f9; --text-2: #94a3b8; --text-3: #475569;
      --purple: #7c3aed; --indigo: #6366f1; --green: #10b981;
      --cyan: #06b6d4; --amber: #f59e0b; --red: #ef4444;
      --grad-purple: linear-gradient(135deg, #7c3aed 0%, #6366f1 50%, #a855f7 100%);
      --grad-green:  linear-gradient(135deg, #10b981 0%, #059669 100%);
      --grad-amber:  linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
      --grad-cyan:   linear-gradient(135deg, #06b6d4 0%, #818cf8 100%);
      --r-sm: 10px; --r-md: 16px; --r-lg: 20px; --r-xl: 28px;
    }
    body {
      font-family: 'Inter', 'Microsoft JhengHei', sans-serif;
      background: var(--bg); color: var(--text-1);
      min-height: 100vh; display: flex; flex-direction: column;
      overflow-x: hidden;
    }

    /* ── Aurora ── */
    .aurora { position: fixed; inset: 0; z-index: -2; overflow: hidden; pointer-events: none; }
    .aurora-blob { position: absolute; border-radius: 50%; filter: blur(120px); }
    .aurora-blob:nth-child(1) {
      width: 700px; height: 700px; opacity: .14;
      background: radial-gradient(circle, #7c3aed, transparent 70%);
      top: -280px; left: -200px;
      animation: b1 28s ease-in-out infinite;
    }
    .aurora-blob:nth-child(2) {
      width: 500px; height: 500px; opacity: .1;
      background: radial-gradient(circle, #06b6d4, transparent 70%);
      bottom: -180px; right: -150px;
      animation: b2 35s ease-in-out infinite;
    }
    .aurora-blob:nth-child(3) {
      width: 350px; height: 350px; opacity: .07;
      background: radial-gradient(circle, #10b981, transparent 70%);
      top: 40%; left: 55%;
      animation: b3 22s ease-in-out infinite;
    }
    @keyframes b1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(50px,35px) scale(1.1)} }
    @keyframes b2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,-25px) scale(1.08)} }
    @keyframes b3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-20px,30px) scale(1.15)} }

    /* ── Grid overlay ── */
    .grid-bg {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
      background-size: 64px 64px;
    }

    /* ── Header ── */
    .site-header {
      text-align: center; padding: 72px 24px 44px;
      animation: fadeDown .6s ease;
    }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:translateY(0)} }
    .logo-wrap {
      display: inline-flex; align-items: center; justify-content: center;
      width: 76px; height: 76px;
      background: var(--grad-purple);
      border-radius: 22px; font-size: 38px; margin-bottom: 24px;
      box-shadow: 0 0 50px rgba(124,58,237,.28), inset 0 1px 0 rgba(255,255,255,.2);
      animation: glow 4s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100%{box-shadow:0 0 50px rgba(124,58,237,.28),inset 0 1px 0 rgba(255,255,255,.2)}
      50%{box-shadow:0 0 80px rgba(124,58,237,.42),inset 0 1px 0 rgba(255,255,255,.2)}
    }
    .site-header h1 {
      font-size: clamp(1.8rem,4vw,2.5rem); font-weight: 800; letter-spacing: -.03em;
      background: linear-gradient(135deg, #f1f5f9 30%, #94a3b8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 10px;
    }
    .site-header p { color: var(--text-3); font-size: .9rem; }

    /* ── Main grid ── */
    .main {
      flex: 1; display: grid; grid-template-columns: 1fr 1fr;
      gap: 24px; max-width: 960px; margin: 0 auto;
      padding: 0 24px 80px; width: 100%;
      animation: fadeUp .6s .1s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    /* ── Panel ── */
    .panel {
      background: var(--glass);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border); border-radius: var(--r-xl);
      padding: 32px; display: flex; flex-direction: column; gap: 16px;
      transition: border-color .3s;
    }
    .panel:hover { border-color: var(--border-strong); }

    .panel-header { display: flex; align-items: center; gap: 16px; margin-bottom: 4px; }
    .panel-icon {
      width: 52px; height: 52px; border-radius: var(--r-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .icon-student { background: var(--grad-green); box-shadow: 0 4px 20px rgba(16,185,129,.3), inset 0 1px 0 rgba(255,255,255,.2); }
    .icon-teacher { background: var(--grad-amber); box-shadow: 0 4px 20px rgba(245,158,11,.3), inset 0 1px 0 rgba(255,255,255,.2); }
    .panel-title { font-size: 1.2rem; font-weight: 700; letter-spacing: -.01em; }
    .panel-desc { font-size: .8rem; color: var(--text-3); margin-top: 2px; }

    .divider { height: 1px; background: var(--border); }

    /* ── Survey cards ── */
    .survey-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: var(--r-md);
      border: 1px solid var(--border); text-decoration: none;
      color: var(--text-1); background: transparent;
      transition: all .2s cubic-bezier(.4,0,.2,1);
    }
    .survey-card:hover {
      border-color: var(--border-strong); background: var(--glass-hover);
      transform: translateY(-2px);
    }
    .card-icon {
      width: 44px; height: 44px; border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .card-pre   { background: rgba(99,102,241,.15); }
    .card-post  { background: rgba(16,185,129,.15); }
    .card-vital { background: rgba(6,182,212,.15); }
    .card-text .title { font-size: .95rem; font-weight: 600; }
    .card-text .sub   { font-size: .78rem; color: var(--text-3); margin-top: 2px; }
    .arrow { margin-left: auto; color: var(--text-3); font-size: 1.1rem; transition: transform .2s, color .2s; }
    .survey-card:hover .arrow { transform: translateX(3px); color: var(--text-2); }

    /* ── Login form ── */
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: .72rem; font-weight: 600; color: var(--text-3); letter-spacing: .06em; text-transform: uppercase; }
    .form-group input {
      padding: 12px 14px; background: rgba(255,255,255,.03);
      border: 1px solid var(--border); border-radius: var(--r-sm);
      color: var(--text-1); font-size: .9rem; font-family: inherit; transition: all .2s;
    }
    .form-group input:focus {
      outline: none; border-color: rgba(245,158,11,.5);
      background: rgba(255,255,255,.05); box-shadow: 0 0 0 3px rgba(245,158,11,.12);
    }
    .btn-teacher {
      width: 100%; padding: 14px; background: var(--grad-amber);
      border: none; border-radius: var(--r-sm); color: white;
      font-size: .95rem; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: all .2s;
      box-shadow: 0 4px 20px rgba(245,158,11,.28), inset 0 1px 0 rgba(255,255,255,.2);
    }
    .btn-teacher:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(245,158,11,.4), inset 0 1px 0 rgba(255,255,255,.2);
    }
    .btn-teacher:active { transform: translateY(0); }
    .login-error {
      font-size: .82rem; color: #f87171; text-align: center; display: none;
      padding: 10px; background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.2); border-radius: var(--r-sm);
    }

    @media (max-width: 680px) {
      .main { grid-template-columns: 1fr; gap: 16px; }
      .site-header { padding: 48px 24px 28px; }
    }
  </style>
</head>
<body>
  <div class="aurora">
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
  </div>
  <div class="grid-bg"></div>

  <header class="site-header">
    <div class="logo-wrap">🎓</div>
    <h1>課程學習系統</h1>
    <p>請選擇你的身份</p>
  </header>

  <main class="main">
    <!-- 學員 -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-icon icon-student">👨‍🎓</div>
        <div>
          <div class="panel-title">學員入口</div>
          <div class="panel-desc">填寫問卷與課堂練習</div>
        </div>
      </div>
      <div class="divider"></div>
      <a class="survey-card" href="pre.html">
        <div class="card-icon card-pre">📋</div>
        <div class="card-text">
          <div class="title">課前問卷</div>
          <div class="sub">課程開始前填寫</div>
        </div>
        <span class="arrow">›</span>
      </a>
      <a class="survey-card" href="post.html">
        <div class="card-icon card-post">✅</div>
        <div class="card-text">
          <div class="title">課後問卷</div>
          <div class="sub">課程結束後填寫</div>
        </div>
        <span class="arrow">›</span>
      </a>
      <a class="survey-card" href="vital.html">
        <div class="card-icon card-vital">🩺</div>
        <div class="card-text">
          <div class="title">生命徵象量測</div>
          <div class="sub">課堂練習記錄</div>
        </div>
        <span class="arrow">›</span>
      </a>
    </div>

    <!-- 講師 -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-icon icon-teacher">👩‍🏫</div>
        <div>
          <div class="panel-title">講師入口</div>
          <div class="panel-desc">查看問卷統計與資料</div>
        </div>
      </div>
      <div class="divider"></div>
      <form id="loginForm">
        <div style="display:flex;flex-direction:column;gap:16px;">
          <div class="form-group">
            <label>帳號</label>
            <input type="text" id="username" placeholder="admin" autocomplete="username">
          </div>
          <div class="form-group">
            <label>密碼</label>
            <input type="password" id="password" placeholder="••••••" autocomplete="current-password">
          </div>
          <button type="submit" class="btn-teacher">進入後台管理</button>
          <div class="login-error" id="loginError">帳號或密碼錯誤</div>
        </div>
      </form>
    </div>
  </main>

  <script>
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'admin123456';
    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        sessionStorage.setItem('adminAuth', '1');
        window.location.href = 'admin.html';
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    });
  </script>
</body>
</html>
