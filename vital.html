<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生命徵象量測</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #06060f; --glass: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.08); --border-strong: rgba(255,255,255,.16);
      --text-1: #f1f5f9; --text-2: #94a3b8; --text-3: #475569;
      --cyan: #06b6d4; --blue: #3b82f6; --green: #10b981;
      --red: #ef4444; --amber: #f59e0b;
      --grad: linear-gradient(135deg, #06b6d4 0%, #3b82f6 50%, #818cf8 100%);
      --r-sm: 10px; --r-md: 16px; --r-lg: 20px;
    }
    body { font-family:'Inter','Microsoft JhengHei',sans-serif; background:var(--bg); color:var(--text-1); min-height:100vh; line-height:1.6; overflow-x:hidden; }

    .aurora { position:fixed; inset:0; z-index:-2; overflow:hidden; pointer-events:none; }
    .aurora-blob { position:absolute; border-radius:50%; filter:blur(130px); }
    .aurora-blob:nth-child(1) { width:600px; height:600px; opacity:.12; background:radial-gradient(circle,#06b6d4,transparent 70%); top:-200px; left:-150px; animation:b1 26s ease-in-out infinite; }
    .aurora-blob:nth-child(2) { width:400px; height:400px; opacity:.09; background:radial-gradient(circle,#3b82f6,transparent 70%); bottom:-140px; right:-100px; animation:b2 32s ease-in-out infinite; }
    @keyframes b1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(40px,28px) scale(1.1)} }
    @keyframes b2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-18px) scale(1.07)} }

    .grid-bg { position:fixed; inset:0; z-index:-1; pointer-events:none; background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px); background-size:64px 64px; }

    .container { max-width:760px; margin:0 auto; padding:56px 24px 80px; }

    .header { text-align:center; margin-bottom:48px; animation:fadeDown .5s ease; }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
    .badge {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(6,182,212,.1); border:1px solid rgba(6,182,212,.25);
      color:#67e8f9; padding:6px 16px; border-radius:100px;
      font-size:.72rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase;
      margin-bottom:20px;
    }
    .header h1 {
      font-size:clamp(1.75rem,4vw,2.25rem); font-weight:800; letter-spacing:-.03em;
      background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom:10px;
    }
    .header p { color:var(--text-3); font-size:.9rem; }

    /* Cards */
    .card {
      background:var(--glass); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border:1px solid var(--border); border-radius:var(--r-lg);
      padding:28px; margin-bottom:14px;
      animation:fadeUp .5s ease both; transition:border-color .3s;
    }
    .card:hover { border-color:var(--border-strong); }
    .card:nth-child(1){animation-delay:.05s} .card:nth-child(2){animation-delay:.1s}
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    .card-label {
      font-size:.68rem; font-weight:700; color:#67e8f9;
      text-transform:uppercase; letter-spacing:.1em; margin-bottom:20px;
      display:flex; align-items:center; gap:8px;
    }
    .card-label::after { content:''; flex:1; height:1px; background:var(--border); }

    /* Fields */
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
    .field-row.single { grid-template-columns:1fr; }
    .field-row.triple { grid-template-columns:1fr 1fr 1fr; }

    .field { display:flex; flex-direction:column; gap:6px; }
    .field-label {
      font-size:.78rem; font-weight:500; color:var(--text-3);
      display:flex; align-items:center; justify-content:space-between;
    }
    .range { font-size:.72rem; color:var(--text-3); font-weight:400; opacity:.7; }

    input[type="text"], input[type="number"], select {
      width:100%; padding:12px 14px;
      background:rgba(255,255,255,.03); border:1px solid var(--border);
      border-radius:var(--r-sm); color:var(--text-1);
      font-size:.9rem; font-family:inherit; transition:all .2s;
      appearance:none; -webkit-appearance:none;
    }
    input:focus, select:focus {
      outline:none; border-color:rgba(6,182,212,.45);
      background:rgba(255,255,255,.05); box-shadow:0 0 0 3px rgba(6,182,212,.12);
    }

    /* Status badges */
    .status-badge {
      font-size:.7rem; font-weight:600; padding:3px 10px;
      border-radius:100px; display:inline-block; margin-top:4px; min-height:22px;
      transition:all .2s;
    }
    .status-normal   { background:rgba(16,185,129,.12); color:#34d399; border:1px solid rgba(16,185,129,.25); }
    .status-abnormal { background:rgba(239,68,68,.12);  color:#f87171; border:1px solid rgba(239,68,68,.25); }
    .status-empty    { background:transparent; color:transparent; border:1px solid transparent; }

    /* BMI */
    .bmi-display {
      background:rgba(255,255,255,.03); border:1px solid var(--border);
      border-radius:var(--r-sm); padding:12px 14px;
      font-size:1.2rem; font-weight:700; color:var(--cyan);
      min-height:44px; display:flex; align-items:center; transition:color .3s;
    }
    .bmi-label { font-size:.72rem; margin-top:4px; transition:color .3s; }

    /* Warning box */
    #warnBox {
      background:rgba(239,68,68,.07); border:1px solid rgba(239,68,68,.2);
      border-radius:var(--r-md); padding:16px 20px; margin-bottom:14px; display:none;
      animation:fadeUp .3s ease;
    }
    #warnBox h4 { color:#f87171; font-size:.85rem; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
    #warnList { list-style:none; display:flex; flex-direction:column; gap:6px; }
    #warnList li { font-size:.82rem; color:var(--text-2); padding:6px 12px; background:rgba(239,68,68,.06); border-radius:6px; }
    #warnList li::before { content:'⚠ '; color:var(--amber); }

    /* Submit */
    .submit-area { padding-top:4px; animation:fadeUp .5s .2s ease both; }
    .btn-submit {
      width:100%; padding:16px; background:var(--grad);
      border:none; border-radius:var(--r-md); color:white;
      font-size:1rem; font-weight:600; cursor:pointer; font-family:inherit;
      transition:all .3s; position:relative; overflow:hidden;
      box-shadow:0 4px 28px rgba(6,182,212,.32),inset 0 1px 0 rgba(255,255,255,.2);
    }
    .btn-submit::after { content:''; position:absolute; inset:0; background:linear-gradient(rgba(255,255,255,.1),transparent); opacity:0; transition:opacity .2s; }
    .btn-submit:hover:not(:disabled)::after { opacity:1; }
    .btn-submit:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 40px rgba(6,182,212,.42),inset 0 1px 0 rgba(255,255,255,.2); }
    .btn-submit:active:not(:disabled) { transform:translateY(0); }
    .btn-submit:disabled { opacity:.5; cursor:not-allowed; }

    .message { text-align:center; margin-top:14px; padding:14px 20px; border-radius:var(--r-sm); font-size:.88rem; }
    .message.success { background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.25); color:#34d399; }
    .message.error   { background:rgba(239,68,68,.1);  border:1px solid rgba(239,68,68,.25);  color:#f87171; }

    .nav-link { text-align:center; margin-top:36px; }
    .nav-link a { color:var(--text-3); text-decoration:none; font-size:.85rem; font-weight:500; transition:color .2s; }
    .nav-link a:hover { color:var(--text-2); }

    @media(max-width:600px) {
      .container{padding:36px 16px 60px;}
      .field-row,.field-row.triple{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
  <div class="aurora"><div class="aurora-blob"></div><div class="aurora-blob"></div></div>
  <div class="grid-bg"></div>

  <div class="container">
    <div class="header">
      <div class="badge">🩺 課堂練習</div>
      <h1>生命徵象量測</h1>
      <p>請依量測結果填寫，異常數值會自動標示提醒</p>
    </div>

    <form id="vitalForm">
      <!-- 生命徵象 -->
      <div class="card">
        <div class="card-label">生命徵象</div>

        <div class="field-row">
          <div class="field">
            <label class="field-label">體溫 (°C)<span class="range">正常：36.1–37.2</span></label>
            <input type="number" id="temp" name="temp" step="0.1" min="34" max="42" placeholder="例：36.5" oninput="check('temp')">
            <span class="status-badge status-empty" id="st-temp"></span>
          </div>
          <div class="field">
            <label class="field-label">脈搏 (次/分)<span class="range">正常：60–100</span></label>
            <input type="number" id="pulse" name="pulse" step="1" min="20" max="250" placeholder="例：72" oninput="check('pulse')">
            <span class="status-badge status-empty" id="st-pulse"></span>
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label class="field-label">收縮壓 (mmHg)<span class="range">正常：&lt;120</span></label>
            <input type="number" id="sbp" name="sbp" step="1" min="50" max="250" placeholder="例：118" oninput="check('sbp')">
            <span class="status-badge status-empty" id="st-sbp"></span>
          </div>
          <div class="field">
            <label class="field-label">舒張壓 (mmHg)<span class="range">正常：&lt;80</span></label>
            <input type="number" id="dbp" name="dbp" step="1" min="30" max="150" placeholder="例：76" oninput="check('dbp')">
            <span class="status-badge status-empty" id="st-dbp"></span>
          </div>
        </div>

        <div class="field-row single">
          <div class="field">
            <label class="field-label">呼吸型態</label>
            <select id="breath" name="breath">
              <option value="">請選擇</option>
              <option value="規則">規則</option>
              <option value="費力">費力</option>
              <option value="淺快">淺快</option>
            </select>
          </div>
        </div>

        <div class="field-row single">
          <div class="field">
            <label class="field-label">血糖 (mg/dL)<span class="range">空腹正常：70–100</span></label>
            <input type="number" id="glucose" name="glucose" step="1" min="20" max="600" placeholder="例：95（空腹）" oninput="check('glucose')">
            <span class="status-badge status-empty" id="st-glucose"></span>
          </div>
        </div>
      </div>

      <!-- 身體組成 -->
      <div class="card">
        <div class="card-label">身體組成</div>
        <div class="field-row triple">
          <div class="field">
            <label class="field-label">身高 (cm)</label>
            <input type="number" id="height" name="height" step="0.1" min="100" max="250" placeholder="例：165" oninput="calcBMI()">
          </div>
          <div class="field">
            <label class="field-label">體重 (kg)</label>
            <input type="number" id="weight" name="weight" step="0.1" min="20" max="300" placeholder="例：60" oninput="calcBMI()">
          </div>
          <div class="field">
            <label class="field-label">BMI <span class="range">自動換算</span></label>
            <div class="bmi-display" id="bmiDisplay">—</div>
            <div class="bmi-label" id="bmiLabel"></div>
          </div>
        </div>
      </div>

      <!-- 異常提醒 -->
      <div id="warnBox">
        <h4>⚠ 異常數值提醒</h4>
        <ul id="warnList"></ul>
      </div>

      <div class="submit-area">
        <button type="submit" class="btn-submit" id="submitBtn">送出記錄</button>
        <div id="message" class="message" style="display:none;"></div>
      </div>
    </form>

    <div class="nav-link" style="margin-top:24px;">
      <a href="index.html">← 返回首頁</a>
    </div>
  </div>

  <script>
    const VITAL_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx_XM53QJf5fty5IQUKTg7KrsFRiutr6Qg7TK2K_lbyVecmKEvgveQPCnXGG5ibcLotjQ/exec';

    const rules = {
      temp:    { min: 36.1, max: 37.2, label: '體溫' },
      pulse:   { min: 60,   max: 100,  label: '脈搏' },
      sbp:     { min: 0,    max: 120,  label: '收縮壓' },
      dbp:     { min: 0,    max: 80,   label: '舒張壓' },
      glucose: { min: 70,   max: 100,  label: '血糖（空腹參考）' }
    };

    function check(field) {
      const input = document.getElementById(field);
      const badge = document.getElementById('st-' + field);
      const val = parseFloat(input.value);
      if (input.value === '' || isNaN(val)) {
        badge.className = 'status-badge status-empty';
        badge.textContent = '';
      } else {
        const r = rules[field];
        const ok = val >= r.min && val <= r.max;
        badge.className = 'status-badge ' + (ok ? 'status-normal' : 'status-abnormal');
        badge.textContent = ok ? '正常' : '異常';
      }
      updateWarn();
    }

    function calcBMI() {
      const h = parseFloat(document.getElementById('height').value);
      const w = parseFloat(document.getElementById('weight').value);
      const display = document.getElementById('bmiDisplay');
      const lbl = document.getElementById('bmiLabel');
      if (h > 0 && w > 0) {
        const bmi = (w / ((h / 100) ** 2)).toFixed(1);
        display.textContent = bmi;
        let cat = '';
        if (bmi < 18.5)      cat = '體重過輕';
        else if (bmi < 24)   cat = '正常範圍';
        else if (bmi < 27)   cat = '過重';
        else if (bmi < 30)   cat = '輕度肥胖';
        else if (bmi < 35)   cat = '中度肥胖';
        else                  cat = '重度肥胖';
        const isNormal = bmi >= 18.5 && bmi < 24;
        display.style.color = isNormal ? 'var(--green)' : 'var(--amber)';
        lbl.textContent = cat;
        lbl.style.color = isNormal ? 'var(--green)' : 'var(--amber)';
      } else {
        display.textContent = '—';
        display.style.color = 'var(--cyan)';
        lbl.textContent = '';
      }
      updateWarn();
    }

    function updateWarn() {
      const warns = [];
      Object.keys(rules).forEach(field => {
        const input = document.getElementById(field);
        const val = parseFloat(input.value);
        if (!isNaN(val) && input.value !== '') {
          const r = rules[field];
          if (val < r.min || val > r.max)
            warns.push(`${r.label}：${val}（正常 ${r.min}${r.max < 9999 ? '–' + r.max : ' 以下'}）`);
        }
      });
      const bmiEl = document.getElementById('bmiDisplay');
      const bmiVal = parseFloat(bmiEl.textContent);
      if (!isNaN(bmiVal) && (bmiVal < 18.5 || bmiVal >= 24))
        warns.push(`BMI：${bmiVal}（正常 18.5–23.9）`);

      const box = document.getElementById('warnBox');
      const list = document.getElementById('warnList');
      if (warns.length > 0) {
        list.innerHTML = warns.map(w => `<li>${w}</li>`).join('');
        box.style.display = 'block';
      } else {
        box.style.display = 'none';
      }
    }

    document.getElementById('vitalForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = '送出中...';
      hideMsg();

      const h = parseFloat(document.getElementById('height').value) || null;
      const w = parseFloat(document.getElementById('weight').value) || null;
      const bmiRaw = (h && w) ? +(w / ((h / 100) ** 2)).toFixed(1) : null;

      const data = {
        temp:      document.getElementById('temp').value,
        pulse:     document.getElementById('pulse').value,
        sbp:       document.getElementById('sbp').value,
        dbp:       document.getElementById('dbp').value,
        breath:    document.getElementById('breath').value,
        glucose:   document.getElementById('glucose').value,
        height:    document.getElementById('height').value,
        weight:    document.getElementById('weight').value,
        bmi:       bmiRaw !== null ? String(bmiRaw) : '',
        timestamp: new Date().toISOString()
      };

      try {
        await fetch(VITAL_SCRIPT_URL, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(data)
        });
        showMsg('success', '✅ 記錄送出成功！');
        e.target.reset();
        ['temp','pulse','sbp','dbp','glucose'].forEach(f => {
          document.getElementById('st-' + f).className = 'status-badge status-empty';
          document.getElementById('st-' + f).textContent = '';
        });
        document.getElementById('bmiDisplay').textContent = '—';
        document.getElementById('bmiDisplay').style.color = 'var(--cyan)';
        document.getElementById('bmiLabel').textContent = '';
        document.getElementById('warnBox').style.display = 'none';
      } catch (err) {
        showMsg('error', '❌ 送出失敗，請確認網路後重試。');
        console.error(err);
      } finally {
        btn.disabled = false; btn.textContent = '送出記錄';
      }
    });

    function showMsg(type, text) {
      const m = document.getElementById('message');
      m.className = 'message ' + type; m.textContent = text; m.style.display = 'block';
    }
    function hideMsg() { document.getElementById('message').style.display = 'none'; }
  </script>
</body>
</html>
